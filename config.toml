baseURL = "https://my-blog-avn.pages.dev/"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
title = "WCMS688 的博客"
hasCJKLanguage = true
enableRobotsTXT = true
summaryLength = 120

[pagination]
  pagerSize = 5
  path = "page"

[permalinks]
  posts = "/posts/:slug/"

[taxonomies]
  tag = "tags"
  category = "categories"
  column = "columns"

[params]
  description = "记录建站、编程、工具与日常思考的极简博客。"
  author = "WCMS688"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = true

  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = false
    noClasses = true
    style = "github"
    tabWidth = 2

[[menu.main]]
  identifier = "home"
  name = "首页"
  url = "/"
  weight = 1

[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 2

[[menu.main]]
  identifier = "columns"
  name = "专栏"
  url = "/columns/"
  weight = 3

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 4
